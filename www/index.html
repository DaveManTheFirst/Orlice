<!-- This has been generated by ChatGPT and modified by me, because i hate web dev and just need a demo for wasm -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orlice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
    }

    .section {
      margin-bottom: 20px;
    }

    button {
      padding: 8px 12px;
      margin-top: 10px;
      cursor: pointer;
    }

    select, input[type="file"] {
      width: 100%;
      padding: 6px;
      margin-top: 5px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .input-row button {
      background: crimson;
      color: white;
      border: none;
    }

    .checkbox-group label {
      display: block;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Create Maps of your EU IV campaigns</h2>

  <!-- File Upload -->
  <div class="section">
    <label><strong>Upload Savefile:</strong></label>
    <input type="file" id="input_savefile">
  </div>

  <!-- Output Options -->
  <div class="section checkbox-group">
    <label><strong>Options:</strong></label>
    <label><input type="checkbox" id="showAllies"> Show Allies</label>
    <label><input type="checkbox" id="blendAllies" disabled=true> Blend Allies</label>
    <label><input type="checkbox" id="showSubjects"> Show Subjects</label>
    <label><input type="checkbox" id="blendSubjects" disabled=true> Blend Subjects</label>
    <label><input type="checkbox" id="subjectCol" disabled=true> Subjects in Overlord Color</label>
    <label><input type="checkbox" id="showAll"> Show all</label>
  </div>

  <!-- Dynamic Inputs -->
  <div class="section">
    <label><strong>Nations:</strong></label>
    <div id="inputsContainer"></div>
    <button id="btnAddNation" disabled=true>+ Add Nations</button>
  </div>

  <!-- Select Continent -->
  <div class="section">
    <label><strong>Show Continent:</strong></label>
    <select id="selectContinent" >
      <option value="0">All</option>
      <option value="1">North America</option>
      <option value="2">South America</option>
      <option value="3">Europe</option>
      <option value="4">Africa</option>
      <option value="5">Asia</option>
      <option value="6">SE Asia with Oceania</option>
      <option value="7">India and Persia</option>
      <option value="8">East Asia</option>
    </select>
  </div>

  <!-- Submit -->
  <button id="btnSubmitForm">Generate</button>

  <pre id="output"></pre>
</div>

<script src="./bootstrap.js"></script>
</body>
</html>
